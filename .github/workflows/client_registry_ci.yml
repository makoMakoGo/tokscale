name: Client Registry CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop, personal/local-clients]
    paths:
      - "crates/tokscale-core/client-catalog.json"
      - "scripts/generate-client-registry.ts"
      - "packages/frontend/src/lib/clientRegistry.generated.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/client_registry_ci.yml"
  pull_request:
    branches: [main, develop, personal/local-clients]
    paths:
      - "crates/tokscale-core/client-catalog.json"
      - "scripts/generate-client-registry.ts"
      - "packages/frontend/src/lib/clientRegistry.generated.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/client_registry_ci.yml"

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.10

jobs:
  generated-client-registry:
    name: Generated Client Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Check generated client registry
        run: bun run check:client-registry
