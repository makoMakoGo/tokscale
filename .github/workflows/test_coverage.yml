name: Test & Coverage

on:
  workflow_dispatch:
  push:
    branches: [main, develop, personal/local-clients]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'packages/cli/package.json'
      - 'packages/tokscale/package.json'
      - 'packages/cli-*/package.json'
      - 'scripts/*.sh'
      - '.github/workflows/publish-cli.yml'
      - '.github/workflows/test_coverage.yml'
  pull_request:
    branches: [main, develop, personal/local-clients]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'packages/cli/package.json'
      - 'packages/tokscale/package.json'
      - 'packages/cli-*/package.json'
      - 'scripts/*.sh'
      - '.github/workflows/publish-cli.yml'
      - '.github/workflows/test_coverage.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - name: Verify version coherence
        run: bash scripts/check-version-coherence.sh
      - name: Run release helper tests
        run: |
          bash scripts/test-calculate-release-version.sh
          bash scripts/test-check-version-coherence.sh
          bash scripts/test-npm-release-state.sh
          bash scripts/test-prepare-release-provenance.sh
      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: lint-${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            lint-${{ runner.os }}-cargo-
      - name: Check formatting (strict)
        run: cargo fmt --all -- --check
      - name: Run Clippy (strict)
        run: cargo clippy --locked --workspace --all-features -- -D warnings

  coverage:
    name: Code Coverage
    if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest

    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: coverage-${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            coverage-${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --locked --workspace --all-features

      - name: Install cargo-tarpaulin
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: taiki-e/install-action@51b9b111bd6914e2e43286340cbdbf490ef816a3 # cargo-tarpaulin

      - name: Generate coverage report
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          cargo tarpaulin \
            --workspace \
            --all-features \
            --out Xml Json \
            --output-dir ./coverage \
            --timeout 300 \
            --fail-under 45 \
            --verbose

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: "!cancelled() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')"
        with:
          name: coverage-report
          path: ./coverage/
          retention-days: 7
