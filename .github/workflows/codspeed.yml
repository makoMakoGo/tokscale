name: CodSpeed

on:
  workflow_dispatch:
  push:
    branches:
      - personal/local-clients
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/codspeed.yml"
  pull_request:
    branches:
      - personal/local-clients
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/codspeed.yml"

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-core:
    name: CodSpeed / rust-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: codspeed-v2-${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            codspeed-v2-${{ runner.os }}-cargo-

      - name: Install cargo-codspeed
        run: cargo install cargo-codspeed --locked --version 4.7.0

      - name: Build benchmark targets
        run: cargo codspeed build -p tokscale-core

      - name: Run benchmark targets
        uses: CodSpeedHQ/action@63f3e98b61959fe67f146a3ff022e4136fe9bb9c # v4
        with:
          mode: simulation
          run: cargo codspeed run -p tokscale-core
