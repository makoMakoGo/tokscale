name: Launcher Validation

on:
  workflow_dispatch:
  push:
    branches: [main, develop, personal/local-clients]
    paths:
      - "packages/cli/bin.js"
      - "packages/cli/src/**"
      - "packages/cli/tsconfig.json"
      - "packages/cli/package.json"
      - "packages/tokscale/bin.js"
      - "packages/tokscale/package.json"
      - "packages/cli-*/package.json"
      - "scripts/test-package-launchers.sh"
      - ".github/workflows/launcher_validation.yml"
      - "package.json"
      - "bun.lock"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main, develop, personal/local-clients]
    paths:
      - "packages/cli/bin.js"
      - "packages/cli/src/**"
      - "packages/cli/tsconfig.json"
      - "packages/cli/package.json"
      - "packages/tokscale/bin.js"
      - "packages/tokscale/package.json"
      - "packages/cli-*/package.json"
      - "scripts/test-package-launchers.sh"
      - ".github/workflows/launcher_validation.yml"
      - "package.json"
      - "bun.lock"
      - "Cargo.toml"
      - "Cargo.lock"

jobs:
  launcher-smoke:
    name: Launcher Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Run launcher smoke tests
        run: bash scripts/test-package-launchers.sh
